<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goto - EdsonMóveis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Courier New', Courier, monospace;
      font-size: 3rem;
      font-weight: 700;
      margin: 0 0 6px;
      color: #000;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #666;
      margin: 0;
      font-size: 0.95rem;
    }

    .subtitle code {
      background: #e8e8e8;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    /* Add form */
    .add-form {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 140px;
    }

    .field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="url"] {
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="url"]:focus {
      border-color: #0066ff;
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
    }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .btn-primary {
      background: #0066ff;
      color: #fff;
    }

    .btn-copy {
      background: #e8e8e8;
      color: #333;
      padding: 5px 10px;
      font-size: 0.8rem;
    }

    .btn-delete {
      background: transparent;
      color: #cc2200;
      padding: 5px 10px;
      font-size: 0.8rem;
      border: 1px solid #eecdcc;
    }

    .btn-delete:hover {
      background: #fff0ee;
      opacity: 1;
    }

    /* Table */
    .table-wrap {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .table-header {
      padding: 14px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h2 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
    }

    .count-badge {
      font-size: 0.8rem;
      color: #888;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
    }

    td {
      padding: 12px 20px;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #fafafa; }

    .alias-link {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 600;
      color: #0066ff;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .alias-link:hover { text-decoration: underline; }

    .target-url {
      color: #555;
      max-width: 380px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #aaa;
    }

    .empty-state p { margin: 8px 0 0; font-size: 0.9rem; }

    /* Error message */
    .error-msg {
      color: #cc2200;
      font-size: 0.85rem;
      margin-top: 6px;
      display: none;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img src="/edsonmoveis.png" width="300" height="50">
    <p class="subtitle">URL shortener &mdash; type <code>goto/&lt;white_monster&gt;</code> in any browser</p>
  </header>

  <form class="add-form" id="addForm">
    <div class="field">
      <label for="aliasInput">Alias</label>
      <input type="text" id="aliasInput" placeholder="white_monster" pattern="[a-zA-Z0-9_-]+" required autocomplete="off" spellcheck="false">
    </div>
    <div class="field" style="flex:2;">
      <label for="urlInput">Destination URL</label>
      <input type="url" id="urlInput" placeholder="https://www.monsterenergy.com/" required autocomplete="off">
    </div>
    <button type="submit" class="btn btn-primary">Add</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="table-wrap">
    <div class="table-header">
      <h2>Aliases</h2>
      <span class="count-badge" id="countBadge">0 saved</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Alias</th>
          <th>Destination</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="aliasBody"></tbody>
    </table>
  </div>
</div>

<div id="toast">Copied to clipboard!</div>

<script>
  const aliasBody  = document.getElementById('aliasBody');
  const countBadge = document.getElementById('countBadge');
  const errorMsg   = document.getElementById('errorMsg');
  const toast      = document.getElementById('toast');
  let toastTimer;

  function showToast(msg = 'Copied to clipboard!') {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  function clearError() {
    errorMsg.style.display = 'none';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderTable(aliases) {
    const entries = Object.entries(aliases);
    countBadge.textContent = `${entries.length} saved`;

    if (entries.length === 0) {
      aliasBody.innerHTML = `<tr><td colspan="3"><div class="empty-state">
        <strong>No aliases yet</strong>
        <p>Add one above to get started.</p>
      </div></td></tr>`;
      return;
    }

    aliasBody.innerHTML = entries.map(([alias, target]) => {
      const gotoUrl = `http://goto/${alias}`;
      return `<tr>
        <td>
          <a class="alias-link" href="${escapeHtml(gotoUrl)}" target="_blank">${escapeHtml(alias)}</a>
        </td>
        <td>
          <span class="target-url" title="${escapeHtml(target)}">${escapeHtml(target)}</span>
        </td>
        <td>
          <div class="actions">
            <button class="btn btn-copy" onclick="copyAlias('${escapeHtml(alias)}')">Copy link</button>
            <button class="btn btn-delete" onclick="deleteAlias('${escapeHtml(alias)}')">Delete</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  async function loadAliases() {
    const res  = await fetch('/api/aliases');
    const data = await res.json();
    renderTable(data);
  }

  async function addAlias(alias, targetUrl) {
    const res  = await fetch('/api/aliases', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ alias, url: targetUrl }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to add alias');
    return data;
  }

  async function deleteAlias(alias) {
    if (!confirm(`Delete alias "${alias}"?`)) return;
    await fetch(`/api/aliases/${encodeURIComponent(alias)}`, { method: 'DELETE' });
    await loadAliases();
  }

  function copyAlias(alias) {
    navigator.clipboard.writeText(`http://goto/${alias}`)
      .then(() => showToast('Copied to clipboard!'))
      .catch(() => showToast('Could not copy — clipboard blocked'));
  }

  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const alias = document.getElementById('aliasInput').value.trim();
    const targetUrl = document.getElementById('urlInput').value.trim();
    try {
      await addAlias(alias, targetUrl);
      document.getElementById('aliasInput').value = '';
      document.getElementById('urlInput').value = '';
      await loadAliases();
      showToast(`Added: http://goto/${alias}`);
    } catch (err) {
      showError(err.message);
    }
  });

  loadAliases();

  function closeMonster() {
    const overlay = document.getElementById("monster-overlay");
    if (overlay) overlay.remove();
  }

</script>
</body>
</html>
